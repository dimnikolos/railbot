<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Railbot - Advanced Mode</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="activity.css">
  
  <!-- Horizontal Blocks (ScratchJr style) -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>

<body>
  
  <div class="advanced-layout">
    
    <!-- Left Panel: Game Board -->
    <div class="game-panel glass">
      <div class="header" style="padding: 16px;">
        <div class="header-top" style="display: flex; justify-content: space-between; align-items: center;">
          <h1 style="margin: 0;">Railbot <span style="font-size: 1rem; color: #64748b;">Advanced</span></h1>
          <div style="display: flex; gap: 8px;">
            <button class="icon-btn" id="btnSettings" title="Ρυθμίσεις" style="background: none; border: none; cursor: pointer; color: var(--primary);">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 28px; height: 28px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
            <a href="index.html" id="btnHeaderBack" class="control-btn" style="text-decoration: none; width: auto; padding: 0 12px; font-weight: bold; height: 36px; display: flex; align-items: center;">Back</a>
          </div>
        </div>
        <div class="level-info" style="margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px;">
          <button id="btnPrevLevel" class="icon-btn" style="background: none; border: none; cursor: pointer; color: var(--primary);" title="Previous Level">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <span>Level <span id="levelDisplay">1</span></span>
          <button id="btnNextLevel" class="icon-btn" style="background: none; border: none; cursor: pointer; color: var(--primary);" title="Next Level">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
            </svg>
          </button>
        </div>
      </div>

      <div class="board-container board-container-8x8">
        <div id="grid" class="grid grid-8x8">
          <!-- 8x8 Grid cells will be generated by JS -->
        </div>

        <!-- Dynamic Layer for Tracks -->
        <div id="trackLayer" class="overlay-layer"></div>

        <!-- Dynamic Layer for Passengers -->
        <div id="passengerLayer" class="overlay-layer"></div>

        <!-- The Train -->
        <img src="top_down_train2.png" id="train" class="train" alt="Train">
      </div>
      
      <div class="controls-panel" style="width: auto;">
        <!-- Normal Play Controls -->
        <div id="playControls">
          <div class="buttons-row">
            <button class="control-btn action-btn play-btn" id="btnPlay" title="Run Code">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z" />
              </svg>
            </button>
            <button class="control-btn action-btn stop-btn" id="btnStop" title="Stop">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <rect x="6" y="6" width="12" height="12" />
              </svg>
            </button>
            <div class="separator"></div>
            <button class="control-btn action-btn delete-btn" id="btnClear" title="Clear Blocks">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Builder Controls -->
        <div id="builderControls" style="display: none; text-align: center;">
          <h3 style="margin-top: 0; color: var(--primary);">Builder Mode</h3>
          <p style="font-size: 0.9rem; margin-bottom: 16px; color: #64748b;">Click the grid to place or remove objects.</p>
          <div class="buttons-row">
            <button class="control-btn action-btn stop-btn" id="btnCancelBuilder"
              style="width: auto; padding: 0 16px; border-radius: 8px;">Cancel</button>
            <button class="control-btn action-btn play-btn" id="btnSaveBuilder"
              style="width: auto; padding: 0 16px; border-radius: 8px;">Save</button>
          </div>
        </div>

      </div>

    </div>

    <!-- Right Panel: Horizontal Workspace -->
    <div class="horizontal-workspace-panel glass">
      <div class="hw-sequence-wrapper">
        <div class="hw-sequence-container" id="hwSequenceContainer">
          <div class="h-block seq-block green-block" id="startBlock" style="pointer-events: none;" title="Start" data-type="start">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width: 32px; height: 32px;">
              <path d="M8 5v14l11-7z" />
            </svg>
          </div>
        </div>
      </div>
      
      <div class="hw-palette-container" id="hwPaletteContainer">
        <!-- Palette categories -->
        <div class="hw-category hw-category-palette" id="catMovement">
          <div class="h-block palette-block blue-block" data-type="straight" title="Move Forward">⬆️</div>
          <div class="h-block palette-block blue-block" data-type="left" title="Turn Left">⬅️</div>
          <div class="h-block palette-block blue-block" data-type="right" title="Turn Right">➡️</div>
        </div>
        <div class="hw-category hw-category-palette" id="catActions">
          <div class="h-block palette-block pink-block" data-type="sound" title="Whistle"><span style="font-size: 1.2rem; display: flex; align-items: center; gap: 2px;">🚂🎵</span></div>
        </div>
        <div class="hw-category hw-category-palette" id="catLoops">
          <div class="h-block palette-block yellow-block loop-wrapper-block" data-type="loop_wrapper" title="Repeat X Times">
            <div class="loop-header">🔁 <span class="editable-num" contenteditable="true" spellcheck="false">3</span></div>
            <div class="loop-body nested-sortable"></div>
          </div>
        </div>
        <div class="hw-category hw-category-palette" id="logicCategory" style="display: none;">
          <div class="h-block palette-block orange-block loop-wrapper-block" data-type="if_boulder" title="If Boulder Ahead">
            <div class="loop-header">🪨❓</div>
            <div class="loop-body nested-sortable"></div>
          </div>
        </div>
      </div>
    </div>
    
  </div>

  <!-- Error / Toast Modal -->
  <div id="toast" class="toast">
    <span id="toastMsg">Error!</span>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal">
    <div class="modal-content glass">
      <h2 style="margin-top: 0; color: var(--primary);">Settings</h2>

      <div class="setting-item">
        <label>Speed (Train):</label>
        <div class="toggle-group">
          <button id="btnTurtle" class="toggle-btn active" title="Slow">🐢</button>
          <button id="btnHare" class="toggle-btn" title="Fast">🐇</button>
        </div>
      </div>

      <div class="setting-item">
        <label>Sound:</label>
        <div class="toggle-group">
          <button id="btnSoundOff" class="toggle-btn active" title="Off">🔇</button>
          <button id="btnSoundOn" class="toggle-btn" title="On">🔊</button>
        </div>
      </div>

      <div class="setting-item">
        <label>Logic Blocks (If/Else):</label>
        <div class="toggle-group">
          <button id="btnLogicOff" class="toggle-btn active" title="Off">❌</button>
          <button id="btnLogicOn" class="toggle-btn" title="On">✅</button>
        </div>
      </div>

      <div class="setting-item" style="flex-direction: column; align-items: flex-start; gap: 8px; margin-top: 8px;">
        <label>Levels:</label>
        <div class="levels-grid">
          <button class="level-box edit-level-btn" data-level="1">1</button>
          <button class="level-box edit-level-btn" data-level="2">2</button>
          <button class="level-box edit-level-btn" data-level="3">3</button>
          <button class="level-box edit-level-btn" data-level="4">4</button>
          <button class="level-box edit-level-btn" data-level="5">5</button>
          <button class="level-box edit-level-btn" data-level="6">6</button>
        </div>
      </div>

      <button id="btnCloseSettings" class="control-btn"
        style="margin-top: 16px; width: 100%; height: 40px; font-weight: 600;">Close</button>
    </div>
  </div>

  <audio id="audioTrack" loop>
    <source src="background_music.mp3" type="audio/mpeg">
  </audio>
  <audio id="audioMove" loop>
    <source src="train_move.mp3" type="audio/mpeg">
  </audio>
  <audio id="audioWhistle">
    <source src="train_whistle.mp3" type="audio/mpeg">
  </audio>

  <script src="data.js"></script>
  <script src="advanced.js"></script>
  <script src="advanced_builder.js"></script>

</body>

</html>
