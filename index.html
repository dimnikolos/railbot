<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Railbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="activity.css">
</head>

<body>

  <div class="game-container glass">

    <div class="header">
      <div class="header-top" style="display: flex; justify-content: space-between; align-items: center;">
        <h1>Railbot</h1>
        <button class="icon-btn" id="btnSettings" title="Ρυθμίσεις"
          style="background: none; border: none; cursor: pointer; color: var(--primary);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="width: 28px; height: 28px;">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </button>
      </div>
      <div class="level-info">Level <span id="levelDisplay">1</span></div>
    </div>

    <div class="board-container">
      <div id="grid" class="grid">
        <!-- 5x5 Grid cells will be generated by JS -->
      </div>

      <!-- Dynamic Layer for Tracks -->
      <div id="trackLayer" class="overlay-layer"></div>

      <!-- Dynamic Layer for Passengers -->
      <div id="passengerLayer" class="overlay-layer"></div>

      <!-- The Train -->
      <img src="top_down_train2.png" id="train" class="train" alt="Train">
    </div>

    <div class="controls-panel glass">

      <!-- Normal Play Controls -->
      <div id="playControls">
        <div class="queue-display" id="queueDisplay">
          <!-- Queued commands will appear here -->
        </div>

        <div class="buttons-row" style="margin-top: 16px;">
          <button class="control-btn" id="btnLeft" title="Turn Left Arc">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 10L5 6l4-4" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 6h8a6 6 0 016 6v7" />
            </svg>
          </button>
          <button class="control-btn" id="btnStraight" title="Straight Track">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 20V4m-5 5l5-5 5 5" />
            </svg>
          </button>
          <button class="control-btn" id="btnRight" title="Turn Right Arc">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4-4-4-4" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 6h-8a6 6 0 00-6 6v7" />
            </svg>
          </button>

          <div class="separator"></div>

          <button class="control-btn action-btn delete-btn" id="btnClear" title="Clear Queue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>

          <button class="control-btn action-btn play-btn" id="btnPlay" title="Play">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z" />
            </svg>
          </button>
          <button class="control-btn action-btn stop-btn" id="btnStop" title="Stop">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Builder Controls -->
      <div id="builderControls" style="display: none; text-align: center;">
        <h3 style="margin-top: 0; color: var(--primary);">Builder Mode</h3>
        <p style="font-size: 0.9rem; margin-bottom: 16px; color: #64748b;">Click the grid to place or remove objects.
        </p>
        <div class="buttons-row">
          <button class="control-btn action-btn stop-btn" id="btnCancelBuilder"
            style="width: auto; padding: 0 16px; border-radius: 8px;">Cancel</button>
          <button class="control-btn action-btn play-btn" id="btnSaveBuilder"
            style="width: auto; padding: 0 16px; border-radius: 8px;">Save</button>
        </div>
      </div>

    </div>

  </div>

  <!-- Error / Toast Modal -->
  <div id="toast" class="toast">
    <span id="toastMsg">Error!</span>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal">
    <div class="modal-content glass">
      <h2 style="margin-top: 0; color: var(--primary);">Settings</h2>

      <div class="setting-item">
        <label>Speed (Train):</label>
        <div class="toggle-group">
          <button id="btnTurtle" class="toggle-btn active" title="Slow">🐢</button>
          <button id="btnHare" class="toggle-btn" title="Fast">🐇</button>
        </div>
      </div>

      <div class="setting-item">
        <label>Sound:</label>
        <div class="toggle-group">
          <button id="btnSoundOff" class="toggle-btn active" title="Off">🔇</button>
          <button id="btnSoundOn" class="toggle-btn" title="On">🔊</button>
        </div>
      </div>

      <div class="setting-item">
        <label>Delete single command:</label>
        <div class="toggle-group">
          <button id="btnDeleteSingleOff" class="toggle-btn active" title="Off">🚫</button>
          <button id="btnDeleteSingleOn" class="toggle-btn" title="On">✅</button>
        </div>
      </div>

      <div class="setting-item" style="flex-direction: column; align-items: flex-start; gap: 8px; margin-top: 8px;">
        <label>Levels:</label>
        <div class="levels-grid">
          <button class="level-box edit-level-btn" data-level="1">1</button>
          <button class="level-box edit-level-btn" data-level="2">2</button>
          <button class="level-box edit-level-btn" data-level="3">3</button>
          <button class="level-box edit-level-btn" data-level="4">4</button>
          <button class="level-box edit-level-btn" data-level="5">5</button>
          <button class="level-box edit-level-btn" data-level="6">6</button>
        </div>
      </div>

      <button id="btnCloseSettings" class="control-btn"
        style="margin-top: 16px; width: 100%; height: 40px; font-weight: 600;">Close</button>
    </div>
  </div>

  <audio id="audioTrack" loop>
    <source src="background_music.mp3" type="audio/mpeg">
  </audio>
  <audio id="audioMove" loop>
    <source src="train_move.mp3" type="audio/mpeg">
  </audio>
  <audio id="audioWhistle">
    <source src="train_whistle.mp3" type="audio/mpeg">
  </audio>

  <script src="data.js"></script>
  <script src="activity.js"></script>
  <script src="builder.js"></script>

</body>
